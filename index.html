<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলা টাইপ অনলাইন- Bangla Type Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: background 0.3s, color 0.3s; }
        
        /* Night Mode Styles */
        body.dark { background-color: #0f172a; color: #e2e8f0; }
        .dark .bg-white { background-color: #1e293b !important; color: white; border-color: #334155 !important; }
        .dark .bg-slate-50 { background-color: #0f172a !important; }
        .dark input, .dark textarea { background: #1e293b; color: white; border-color: #475569; }

        .word { display: inline-block; margin-right: 10px; padding: 2px 6px; border-radius: 6px; font-size: 1.5rem; color: #64748b; }
        .correct { color: #10b981 !important; }
        .incorrect { color: #ef4444 !important; background: #fee2e2; text-decoration: underline; }
        .current { background: #4f46e5; color: white !important; transform: scale(1.05); }
        .kb-key { @apply flex flex-col items-center justify-center border rounded-lg p-2 bg-white text-[10px] font-bold shadow-sm transition-all; min-width: 42px; color: #334155; }
        .dark .kb-key { background: #334155; color: white; border-color: #475569; }
        .hint-key { background: #fbbf24 !important; color: black !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="profileOverlay" class="fixed inset-0 bg-indigo-900 z-[200] flex items-center justify-center p-6 hidden">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center">
            <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">👤</div>
            <h2 class="text-2xl font-bold mb-2">প্রোফাইল তৈরি করুন</h2>
            <p class="text-gray-500 text-sm mb-6">আপনার টাইপিং যাত্রা শুরু করতে তথ্যগুলো দিন।</p>
            <input type="text" id="userNameInput" placeholder="আপনার নাম" class="w-full border p-3 rounded-xl mb-3 outline-none focus:ring-2 ring-indigo-500">
            <input type="tel" id="userPhoneInput" placeholder="মোবাইল নম্বর" class="w-full border p-3 rounded-xl mb-6 outline-none focus:ring-2 ring-indigo-500">
            <button onclick="saveProfile()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition">শুরু করুন</button>
        </div>
    </div>

    <nav class="bg-white border-b p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="bg-indigo-600 text-white p-2 rounded-lg font-black">TM</span>
                <div class="leading-tight">
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Type Master Pro</p>
                    <h1 id="userDisplayName" class="text-sm font-bold text-indigo-600">User Name</h1>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleTheme()" class="p-2 bg-slate-100 rounded-full dark:bg-slate-700" title="Day/Night">🌓</button>
                <button onclick="openModal()" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold">+ গল্প</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 flex flex-col lg:flex-row gap-6 mt-4">
        
        <div class="lg:w-2/3 space-y-4">
            <div class="grid grid-cols-4 gap-3">
                <div class="bg-white p-4 rounded-2xl border text-center shadow-sm">
                    <p class="text-[10px] text-gray-400">SPEED (WPM)</p>
                    <h2 id="wpm" class="text-2xl font-bold text-indigo-600">0</h2>
                </div>
                <div class="bg-white p-4 rounded-2xl border text-center shadow-sm">
                    <p class="text-[10px] text-gray-400">ACCURACY</p>
                    <h2 id="accuracy" class="text-2xl font-bold text-green-500">100%</h2>
                </div>
                <div class="bg-white p-4 rounded-2xl border text-center shadow-sm">
                    <p class="text-[10px] text-gray-400">TIME</p>
                    <h2 id="timer" class="text-2xl font-bold text-orange-500">01:00</h2>
                </div>
                <div class="bg-white p-4 rounded-2xl border text-center shadow-sm">
                    <p class="text-[10px] text-gray-400">BEST WPM</p>
                    <h2 id="bestWpm" class="text-2xl font-bold text-purple-600">0</h2>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl border p-6">
                <div id="textDisplay" class="h-48 overflow-y-auto mb-6 p-5 bg-slate-50 dark:bg-slate-900 rounded-2xl border-2 border-dashed leading-loose select-none">
                    গল্প লোড হচ্ছে...
                </div>
                <textarea id="inputArea" 
                    class="w-full h-24 p-5 text-xl rounded-2xl border-2 border-indigo-100 focus:border-indigo-500 shadow-inner outline-none transition-all resize-none"
                    placeholder="টাইপ শুরু করুন..."></textarea>
                
                <div class="flex justify-between mt-4 items-center">
                    <select id="langMode" onchange="initApp()" class="text-xs bg-gray-100 p-2 rounded-lg font-bold border-none outline-none dark:bg-slate-700">
                        <option value="bn">বাংলা (Golpo)</option>
                        <option value="en">English (Story)</option>
                    </select>
                    <div id="wordCounter" class="text-[10px] text-slate-400 font-mono">0/0 WORDS</div>
                </div>
            </div>
        </div>

        <div class="lg:w-1/3 space-y-4">
            <div class="bg-white p-5 rounded-3xl shadow-md border">
                <h3 class="font-bold mb-3 border-b pb-2 text-sm flex justify-between">গল্পের তালিকা <span id="syncIcon" class="text-green-500 text-xs">● Live</span></h3>
                <div id="storyList" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div>
            </div>

            <div class="bg-slate-900 p-5 rounded-3xl shadow-lg">
                <p class="text-white text-[10px] text-center mb-4 opacity-50 uppercase tracking-widest">Keyboard Guide</p>
                <div class="grid grid-cols-5 gap-1" id="visualKb"></div>
            </div>
        </div>
    </main>

    <div id="storyModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl p-6">
            <h2 class="text-xl font-bold mb-4">নতুন গল্প যোগ</h2>
            <input type="text" id="newTitle" placeholder="শিরোনাম" class="w-full border p-3 rounded-xl mb-3 outline-none">
            <textarea id="newContent" placeholder="গল্পের মূল অংশ..." class="w-full border p-3 rounded-xl h-40 mb-4 outline-none resize-none"></textarea>
            <div class="flex gap-2">
                <button onclick="saveCustomStory()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">সেভ</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">বাতিল</button>
            </div>
        </div>
    </div>

    <audio id="typeSound" src="https://www.soundjay.com/communication/typewriter-key-1.mp3"></audio>
    <audio id="errorSound" src="https://www.soundjay.com/buttons/beep-05.mp3"></audio>

<script src="sakibbanglatype.js"></script>
</body>
</html>
